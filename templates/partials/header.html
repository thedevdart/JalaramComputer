<header id="site-header" class="jc-retro-header sticky top-0 z-50 anim-slide-down">
  <style>
    /* Scoped to this partial only — retro navy + gold */
    #site-header.jc-retro-header {
      background: linear-gradient(180deg, rgba(9, 26, 46, 0.98) 0%, rgba(15, 38, 64, 0.96) 100%);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.14);
      box-shadow: 0 4px 24px rgba(9, 26, 46, 0.22);
    }

    #site-header.jc-retro-header::before {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37 20%, #D4AF37 80%, transparent);
      opacity: 0.75;
    }

    #site-header.jc-retro-header .jc-retro-header__inner {
      max-width: 80rem;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 4.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    #site-header.jc-retro-header .jc-retro-header__brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      flex-shrink: 0;
    }

    #site-header.jc-retro-header .jc-retro-header__logo {
      height: 3.25rem;
      width: auto;
      object-fit: contain;
    }

    #site-header.jc-retro-header .jc-retro-header__mark {
      display: none;
      flex-direction: column;
      padding-left: 0.875rem;
      border-left: 1px solid rgba(212, 175, 55, 0.28);
      line-height: 1.15;
    }

    #site-header.jc-retro-header .jc-retro-header__mark strong {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #fff;
    }

    #site-header.jc-retro-header .jc-retro-header__mark span {
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(192, 192, 192, 0.55);
      margin-top: 0.15rem;
    }

    #site-header.jc-retro-header nav {
      display: none;
      align-items: center;
      gap: 0.125rem;
    }

    #site-header.jc-retro-header nav a {
      position: relative;
      display: inline-block;
      padding: 0.5rem 0.875rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(192, 192, 192, 0.78);
      transition: color 0.25s ease, background 0.25s ease;
    }

    /* Override global navbar.css pseudo-underlines */
    #site-header.jc-retro-header nav a::after {
      display: none !important;
    }

    #site-header.jc-retro-header nav a:hover {
      color: #D4AF37;
      background: rgba(212, 175, 55, 0.06);
    }

    #site-header.jc-retro-header nav a.jc-retro-nav--active {
      color: #fff;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 -2px 0 #D4AF37;
      border-bottom: none !important;
      padding-bottom: 0.5rem;
    }

    /* cart-system.js may inject Tailwind border-b — keep a single gold rule */
    #site-header.jc-retro-header nav a.border-b {
      border-bottom: none !important;
      box-shadow: inset 0 -2px 0 #D4AF37;
      color: #fff !important;
      padding-bottom: 0.5rem;
    }

    #site-header.jc-retro-header #header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #site-header.jc-retro-header .jc-retro-search {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.875rem;
      border: 1px solid rgba(212, 175, 55, 0.22);
      background: rgba(26, 58, 92, 0.45);
    }

    #site-header.jc-retro-header .jc-retro-search:focus-within {
      border-color: rgba(212, 175, 55, 0.55);
      background: rgba(26, 58, 92, 0.65);
    }

    #site-header.jc-retro-header .jc-retro-search iconify-icon {
      color: rgba(212, 175, 55, 0.75);
      font-size: 1rem;
    }

    #site-header.jc-retro-header .search-input {
      width: 9rem;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      transition: width 0.35s ease;
    }

    #site-header.jc-retro-header .search-input:focus {
      width: 12rem;
    }

    #site-header.jc-retro-header .search-input::placeholder {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      color: rgba(192, 192, 192, 0.45);
    }

    #site-header.jc-retro-header #nav-cart-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      color: rgba(192, 192, 192, 0.85);
      text-decoration: none;
      border: 1px solid transparent;
      transition: color 0.25s ease, border-color 0.25s ease;
    }

    #site-header.jc-retro-header #nav-cart-link:hover {
      color: #D4AF37;
      border-color: rgba(212, 175, 55, 0.25);
    }

    #site-header.jc-retro-header #nav-cart-link span {
      position: absolute;
      top: 0.15rem;
      right: 0.15rem;
      min-width: 1rem;
      height: 1rem;
      padding: 0 0.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.5625rem;
      font-weight: 700;
      color: #091A2E;
      background: #D4AF37;
    }

    #site-header.jc-retro-header #mobile-menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      padding: 0;
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: rgba(192, 192, 192, 0.9);
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease;
    }

    #site-header.jc-retro-header #mobile-menu-btn:hover {
      color: #D4AF37;
      border-color: rgba(212, 175, 55, 0.45);
    }

    @media (min-width: 640px) {
      #site-header.jc-retro-header .jc-retro-header__mark {
        display: flex;
      }
    }

    @media (min-width: 768px) {
      #site-header.jc-retro-header .jc-retro-search {
        display: flex;
      }
    }

    @media (min-width: 1024px) {
      #site-header.jc-retro-header nav.hidden.lg\:flex {
        display: flex !important;
      }
    }

    @media (max-width: 1023px) {
      #site-header.jc-retro-header .jc-retro-header__inner {
        height: 3.75rem;
      }

      #site-header.jc-retro-header .jc-retro-header__logo {
        height: 2.25rem;
      }
    }
  </style>

  <div class="jc-retro-header__inner">
    <a id="nav-home-logo" href="/" class="jc-retro-header__brand" aria-label="Jalaram Computers home">
      <img src="/assets/images/logo.png?v=2" alt="" class="jc-retro-header__logo" width="160" height="56">
      <span class="jc-retro-header__mark">
        <strong>Jalaram</strong>
        <span>Computers &amp; IT</span>
      </span>
    </a>

    <nav class="hidden lg:flex" aria-label="Main navigation">
      {% for link in nav_links %}
        <a
          id="{{ link.id }}"
          href="{{ link.href }}"
          class="{% if active_nav == link.key %}jc-retro-nav--active{% endif %}"
        >{{ link.label }}</a>
      {% endfor %}
    </nav>

    <div id="header-actions">
      <label class="jc-retro-search" for="header-search">
        <iconify-icon icon="lucide:search" aria-hidden="true"></iconify-icon>
        <input
          type="search"
          id="header-search"
          class="search-input"
          placeholder="Search products…"
          autocomplete="off"
          aria-label="Search products"
        >
      </label>

      <a id="nav-cart-link" href="/cart" aria-label="Shopping cart">
        <iconify-icon icon="lucide:shopping-bag" class="text-xl"></iconify-icon>
        <span aria-hidden="true">0</span>
      </a>

      <button type="button" id="mobile-menu-btn" class="lg:hidden" aria-label="Open menu" aria-expanded="false">
        <iconify-icon icon="lucide:menu" class="text-2xl"></iconify-icon>
      </button>
    </div>
  </div>
</header>
