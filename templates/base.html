<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{ title }}</title>
  <meta name="description" content="Jalaram Computers — computers, laptops, accessories, repair services, networking and CCTV solutions in Mumbai.">

  {% if hero_preload %}
  <link rel="preload" as="image" href="/assets/images/hero/instant_support.webp" fetchpriority="high">
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">

  <link rel="icon" href="/assets/images/favicon.png">
  <link rel="stylesheet" href="/assets/css/app.css?v=1">
  <script src="/assets/js/iconify-icon.min.js" defer></script>
</head>
<body class="jc-site{% if body_class %} {{ body_class }}{% endif %}">

  {% if show_splash %}{% include 'partials/splash.html' %}{% endif %}

  {% include 'partials/header.html' %}

  {% block content %}{% endblock %}

  {% include 'partials/footer.html' %}

  {% if whatsapp_float %}
  <a id="whatsapp-float" href="https://wa.me/919892848643" target="_blank" rel="noopener noreferrer"
     class="jc-whatsapp-float" aria-label="Chat on WhatsApp">
    <iconify-icon icon="mdi:whatsapp"></iconify-icon>
  </a>
  {% endif %}

  <script type="module" src="/assets/js/ui.js?v=1"></script>
  <script type="module" src="/assets/js/cart.js?v=1"></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
